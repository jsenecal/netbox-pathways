[project]
site_name = "NetBox Pathways"
site_url = "https://jsenecal.github.io/netbox-pathways/"
site_description = "Physical cable plant infrastructure documentation for NetBox: structures, pathways, conduits, and routing with PostGIS"
site_author = "Jonathan Senecal"
repo_url = "https://github.com/jsenecal/netbox-pathways"
repo_name = "jsenecal/netbox-pathways"
edit_uri = "edit/main/docs/"
docs_dir = "."
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Configuration" = "getting-started/configuration.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
  ] },
  { "User Guide" = [
    { "Concepts" = "user-guide/concepts.md" },
    { "Structures" = "user-guide/structures.md" },
    { "Pathways" = "user-guide/pathways.md" },
    { "Cable Routing" = "user-guide/cable-routing.md" },
    { "Interactive Map" = "user-guide/interactive-map.md" },
    { "Pull Sheets" = "user-guide/pull-sheets.md" },
    { "QGIS Integration" = "user-guide/qgis-integration.md" },
  ] },
  { "Developer" = [
    { "Architecture" = "developer/architecture.md" },
    { "API Examples" = "developer/api-examples.md" },
    { "Map Layer Registry" = "developer/map-layer-registry.md" },
    { "Contributing" = "developer/contributing.md" },
  ] },
  { "Reference" = [
    { "Choice Fields" = "reference/choices.md" },
    { "GeoJSON API" = "reference/geojson-api.md" },
  ] },
]

[project.theme]
features = [
  "content.action.edit",
  "content.action.view",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"
