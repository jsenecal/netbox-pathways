[[nav.children]]
title = "Quick Start"
path = "getting-started/quickstart.md"

[[nav]]
title = "User Guide"

[[nav.children]]
title = "Concepts"
path = "user-guide/concepts.md"

[[nav.children]]
title = "Structures"
path = "user-guide/structures.md"

[[nav.children]]
title = "Pathways"
path = "user-guide/pathways.md"

[[nav.children]]
title = "Cable Routing"
path = "user-guide/cable-routing.md"

[[nav.children]]
title = "Interactive Map"
path = "user-guide/interactive-map.md"

[[nav.children]]
title = "Pull Sheets"
path = "user-guide/pull-sheets.md"

[[nav.children]]
title = "QGIS Integration"
