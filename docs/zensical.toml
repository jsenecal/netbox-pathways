[project]
name = "NetBox Pathways"
description = "Physical cable plant infrastructure documentation for NetBox"
repo_url = "https://github.com/jsenecal/netbox-pathways"
repo_name = "jsenecal/netbox-pathways"

[theme]
name = "material"
palette_primary = "teal"
palette_accent = "amber"
icon_repo = "fontawesome/brands/github"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.tabs.link",
]

[theme.icon]
logo = "material/map-marker-path"

[[nav]]
title = "Home"
path = "index.md"

[[nav]]
title = "Getting Started"

