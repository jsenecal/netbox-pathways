<div class="pathways-widget" data-field-id="{{ widget.attrs.id }}">
    <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button type="button"
                    class="nav-link active"
                    id="{{ widget.attrs.id }}-tab-map-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#{{ widget.attrs.id }}-tab-map"
                    role="tab"
                    aria-controls="{{ widget.attrs.id }}-tab-map"
                    aria-selected="true">
                <i class="mdi mdi-map"></i> Map
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button type="button"
                    class="nav-link"
                    id="{{ widget.attrs.id }}-tab-coords-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#{{ widget.attrs.id }}-tab-coords"
                    role="tab"
                    aria-controls="{{ widget.attrs.id }}-tab-coords"
                    aria-selected="false">
                <i class="mdi mdi-code-braces"></i> Coordinates
            </button>
        </li>
    </ul>
    <div class="tab-content border-start border-end border-bottom rounded-bottom p-2">
        <div class="tab-pane show active"
             id="{{ widget.attrs.id }}-tab-map"
             role="tabpanel"
             aria-labelledby="{{ widget.attrs.id }}-tab-map-btn">
            <div id="{{ widget.attrs.id }}-map"
                 class="pathways-map-widget"
                 data-field-id="{{ widget.attrs.id }}"
                 data-geom-type="{{ geom_type }}"
                 style="height: 400px; width: 100%;">
            </div>
        </div>
        <div class="tab-pane"
             id="{{ widget.attrs.id }}-tab-coords"
             role="tabpanel"
             aria-labelledby="{{ widget.attrs.id }}-tab-coords-btn">
            <textarea class="form-control font-monospace pathways-coord-textarea"
                      rows="8"
                      spellcheck="false"
                      autocomplete="off"
                      data-coord-textarea
                      aria-describedby="{{ widget.attrs.id }}-coord-help {{ widget.attrs.id }}-coord-error">{{ serialized }}</textarea>
            <div id="{{ widget.attrs.id }}-coord-help" class="form-text">
                Accepts GeoJSON (Geometry or Feature), WKT (POINT, LINESTRING,
                POLYGON), DMS (hemisphere letters optional; lat-first when
                omitted), or decimal "lat, lon" pairs in Google Maps order.
                Coordinates are interpreted as WGS84.
            </div>
            <div id="{{ widget.attrs.id }}-coord-error"
                 class="text-danger small pathways-coord-error"
                 data-coord-error
                 role="alert"
                 aria-live="polite"></div>
        </div>
    </div>
    <input type="hidden" id="{{ widget.attrs.id }}" name="{{ name }}" value="{{ serialized }}">
    {% if endpoint_json %}
    <script type="application/json" id="{{ widget.attrs.id }}-endpoints">{{ endpoint_json }}</script>
    {% endif %}
</div>
