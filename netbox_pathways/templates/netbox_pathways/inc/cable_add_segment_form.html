<form hx-post="/plugins/pathways/cable-routing/{{ cable.pk }}/add-segment/"
      hx-target="#pw-segment-table"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      class="d-flex align-items-end gap-2 mt-2 mb-2">
  {% if after_sequence %}
  <input type="hidden" name="after_sequence" value="{{ after_sequence }}">
  {% endif %}
  <div class="flex-grow-1">
    <label class="form-label">Pathway</label>
    <select name="pathway" class="form-select form-select-sm" required>
      <option value="">---------</option>
      {% for value, label in choices %}
      <option value="{{ value }}">{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-sm btn-primary">Add</button>
  <button type="button" class="btn btn-sm btn-outline-secondary"
          hx-get="/plugins/pathways/cable-routing/{{ cable.pk }}/table/"
          hx-target="#pw-segment-table"
          hx-swap="innerHTML">Cancel</button>
</form>
