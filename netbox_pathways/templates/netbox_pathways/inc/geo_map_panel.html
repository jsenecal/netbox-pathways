<div class="card">
    <h2 class="card-header">
        {{ panel_title|default:"Location" }}
        <div class="card-actions">
            <a class="btn btn-ghost-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#{{ map_id }}-modal" title="Expand map">
                <i class="mdi mdi-arrow-expand-all"></i>
            </a>
        </div>
    </h2>
    <div id="{{ map_id }}" style="height: 300px; width: 100%;"></div>
</div>

<!-- Fullscreen modal -->
<div class="modal fade" id="{{ map_id }}-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="mdi mdi-map-marker-radius"></i> {{ panel_title|default:"Location" }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div id="{{ map_id }}-expanded" style="height: 100%;"></div>
            </div>
        </div>
    </div>
</div>

{{ geo_data|json_script:data_id }}

<script>
document.addEventListener('DOMContentLoaded', function() {
    var data = JSON.parse(document.getElementById('{{ data_id }}').textContent);
    var opts = { dynamicLayers: {{ dynamic_layers|default:"false" }} };
    var map = initGeoMap('{{ map_id }}', data, opts);

    // Leaflet needs a size recalc after the layout settles
    if (map) {
        setTimeout(function() { map.invalidateSize(); }, 150);
    }

    var modalEl = document.getElementById('{{ map_id }}-modal');
    modalEl.addEventListener('shown.bs.modal', function() {
        var expanded = document.getElementById('{{ map_id }}-expanded');
        if (expanded._leafletMap) {
            expanded._leafletMap.invalidateSize();
        } else {
            initGeoMap('{{ map_id }}-expanded', data, opts);
        }
    });
});
</script>
