# Import schema for Gomap PRG_STRUCTURE shapefile
#
# Source: CSEM (Commission des services électriques de Montréal) underground
#         infrastructure database — 20,766 structures, all manholes (PA).
#
# Coordinate system: CAN83-8 = NAD83 / MTM zone 8 (EPSG:32188), projected meters.
# All features are Points. Only active (IDSTATUT=ACT) records are imported.
#
# Usage:
#   python manage.py import_geodata /path/to/PRG_STRUCTURE.shp --schema schemas/gomap_structures.yaml
#   python manage.py import_geodata /path/to/PRG_STRUCTURE.shp --schema schemas/gomap_structures.yaml --dry-run
#   python manage.py import_geodata /path/to/PRG_STRUCTURE.shp --schema schemas/gomap_structures.yaml --limit 100

# Source coordinate reference system (EPSG code)
source_srid: 32188

# Target model in netbox_pathways
model: structure

# Which model field receives the source geometry
geometry_field: location

# Default values for fields not present in the source data
# FK fields accept slug, name, or integer PK
defaults:
  tenant: CSEM

# Name template — can reference any source field
# Produces names like "CSEM PA 7", "CSEM PA 153"
name_template: "CSEM {IDTYPESTRU} {NOSTRUCTUR}"

# Field mappings: source_field → target_field with optional transforms
fields:

  # ANCONSTRUC — Année de Construction (year built), integer like 1913, 1996
  ANCONSTRUC:
    to: installation_date
    transform: year_to_date

  # IDTYPESTRU — type code; current dataset is 100% "PA" (puit d'accès = manhole)
  IDTYPESTRU:
    to: structure_type
    map:
      PA: manhole
      # Add more mappings as new type codes appear:
      # PO: pole
      # CB: cabinet
      # HH: handhole

  # LONGUEUR — interior length of structure in meters (0–84 m range)
  LONGUEUR:
    to: length

  # HAUTEUR — exterior height of structure in meters (often null in this dataset)
  HAUTEUR:
    to: height

  # HAUTEURLIB — Hauteur Libre: internal free clearance height in meters (0–8.3 m)
  # No dedicated model field for internal clearance, so stored as a comment.
  HAUTEURLIB:
    to: comments
    label: "Internal clearance height (m)"

  # Occupant housing flags — boolean 0/1 indicating which utilities have
  # infrastructure housed inside the structure. Mapped to access_notes since
  # they affect who may need to coordinate access.
  #
  # LGMTHQ  — Logement Hydro-Québec (electric utility)
  # LGMTSTM — Logement STM (Société de transport de Montréal, transit)
  # LGMTVM  — Logement Ville de Montréal (City of Montreal)
  # LGBASSETEN — Logement Basse Tension (low-voltage / telecom)
  LGMTHQ:
    to: access_notes
    label: "Hydro-Québec housing"
    transform: boolean_flag

  LGMTSTM:
    to: access_notes
    label: "STM transit housing"
    transform: boolean_flag

  LGMTVM:
    to: access_notes
    label: "Ville de Montréal housing"
    transform: boolean_flag

  LGBASSETEN:
    to: access_notes
    label: "Low-voltage / telecom housing"
    transform: boolean_flag

# Only import active structures (IDSTATUT_D = "Active")
filters:
  IDSTATUT: ACT
